name: Swift CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PROJECT: HappyPianist.xcodeproj
  SCHEME: HappyPianistAVP
  DEVELOPER_DIR: /Applications/Xcode_26.5.app/Contents/Developer

jobs:
  test:
    name: Test (visionOS Simulator)
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain and destinations
        run: |
          set -euo pipefail
          xcodebuild -version
          swift --version
          xcrun simctl list runtimes
          xcodebuild -showdestinations \
            -project "$PROJECT" \
            -scheme "$SCHEME"

      - name: Run all Swift tests
        run: |
