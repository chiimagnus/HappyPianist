name: Swift CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PROJECT: HappyPianist.xcodeproj
  SCHEME: HappyPianistAVP
  DEVELOPER_DIR: /Applications/Xcode_26.5.app/Contents/Developer

jobs:
  test:
    name: Test (visionOS Simulator)
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain and destinations
        run: |
          set -euo pipefail
          xcodebuild -version
          swift --version
          xcrun simctl list runtimes
          xcodebuild -showdestinations \
            -project "$PROJECT" \
            -scheme "$SCHEME"

      - name: Run all Swift tests
        run: |
          set -euo pipefail
          rm -rf "$RUNNER_TEMP/HappyPianistTests.xcresult"

          xcodebuild clean test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'platform=visionOS Simulator,name=Apple Vision Pro,OS=latest' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData-Tests" \
            -resultBundlePath "$RUNNER_TEMP/HappyPianistTests.xcresult" \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: HappyPianistTests-xcresult
          path: ${{ runner.temp }}/HappyPianistTests.xcresult
          if-no-files-found: ignore
          retention-days: 7
