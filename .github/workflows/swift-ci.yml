name: Swift CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PROJECT: HappyPianist.xcodeproj
  SCHEME: HappyPianistAVP
  DEVELOPER_DIR: /Applications/Xcode_26.4.app/Contents/Developer

jobs:
