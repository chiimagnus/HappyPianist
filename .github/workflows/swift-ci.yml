name: Swift CI

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT: HappyPianist.xcodeproj
  SCHEME: HappyPianistAVP
  SIMULATOR_NAME: Apple Vision Pro
  DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer

jobs:
  test:
    name: Test (visionOS Simulator)
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve Makefile Simulator ID
        id: simulator
        run: |
          set -euo pipefail
          simulator_id="$(xcrun simctl list devices available | awk -F '[()]' -v name="$SIMULATOR_NAME" '$1 ~ name { print $4; exit }')"
          test -n "$simulator_id"
          echo "id=$simulator_id" >> "$GITHUB_OUTPUT"

      - name: Show toolchain and destinations
        env:
          SIMULATOR_ID: ${{ steps.simulator.outputs.id }}
        run: |
          set -euo pipefail
          make doctor
          swift --version
          xcrun simctl list runtimes
          make config
          make destinations

      - name: Run all Swift tests through Makefile
        env:
          SIMULATOR_ID: ${{ steps.simulator.outputs.id }}
        run: |
          set -euo pipefail
          make test
