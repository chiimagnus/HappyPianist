name: Swift CI

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT: HappyPianist.xcodeproj
  SCHEME: HappyPianistAVP

jobs:
  test:
    name: Test (visionOS Simulator)
    runs-on: xcode-27
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run all Swift tests
        run: |
          set -euo pipefail
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination 'platform=visionOS Simulator,name=Apple Vision Pro,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            -parallel-testing-enabled NO
